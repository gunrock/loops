name: build

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

# Cancel old runs on the same ref when a new one starts.
concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: linux / ubuntu-${{ matrix.os }} / cuda-${{ matrix.cuda }}
    if: "!contains(github.event.head_commit.message, '[skip build]')"
    runs-on: ubuntu-${{ matrix.os }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        os: ['22.04', '24.04']
        cuda: ['12.6.3', '13.0.0']
        exclude:
          # CUDA 13 needs newer glibc than 22.04 ships.
          - os: '22.04'
            cuda: '13.0.0'

    steps:
      - uses: actions/checkout@v5

      - name: Install CUDA Toolkit ${{ matrix.cuda }}
        uses: Jimver/cuda-toolkit@v0.2.35
        id: cuda-toolkit
        with:
          cuda: ${{ matrix.cuda }}
          # Default `local` method with `--toolkit` skips drivers and samples
          # (~30% smaller install). `network` + sub-packages is faster but the
          # sub-package naming is brittle and version-sensitive on Linux.
          linux-local-args: '["--toolkit"]'
          # Required for matrix builds so each job's log file is unique.
          log-file-suffix: 'ubuntu-${{ matrix.os }}-cuda-${{ matrix.cuda }}.txt'

      - name: nvcc --version
        run: nvcc -V

      - name: 'Configure (preset: ci-multi-arch)'
        run: cmake --preset ci-multi-arch

      - name: Build
        # Parallelism is capped via the preset's "jobs": 2 (not a bare -j):
        # unbounded make -j OOM-kills the ~16 GB runner because every
        # Thrust/CUB-heavy nvcc/cicc spawns at once across the f32/f64 x
        # multi-arch target set.
        run: cmake --build --preset ci-multi-arch

      - name: List built binaries
        run: ls -la build/ci-multi-arch/bin/

  windows:
    name: windows / cuda-${{ matrix.cuda }}
    if: "!contains(github.event.head_commit.message, '[skip build]')"
    # Pin to windows-2022 explicitly: the rolling `windows-latest` label is
    # mid-migration to `windows-2025-vs2026` and the Jimver action has
    # historically had install-path issues on the in-flight image. Revisit
    # when the new image stabilizes.
    runs-on: windows-2022
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        cuda: ['12.6.3']

    steps:
      - uses: actions/checkout@v5

      - name: Install CUDA Toolkit ${{ matrix.cuda }}
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: ${{ matrix.cuda }}
          # `network` method downloads only the sub-packages we need
          # (~500 MB) instead of the full 3 GB local installer, which
          # silently hangs on windows-2022 for 25+ minutes.
          method: network
          # Windows sub-package names use underscores (vs. hyphens on
          # Linux) per the Jimver action's windows-links.ts.
          sub-packages: '["nvcc", "cudart", "curand", "curand_dev", "thrust", "visual_studio_integration"]'
          log-file-suffix: 'windows-cuda-${{ matrix.cuda }}.txt'

      - name: nvcc --version
        run: nvcc -V

      - name: Configure
        # No preset on Windows: the default generator there is Visual Studio
        # which doesn't always honor the preset's generator field. Match the
        # CI preset's architectures (sm_80;sm_90).
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_CUDA_ARCHITECTURES="80;90"

      - name: Build
        # Cap parallelism (-j 2) for the same OOM reason as the Linux job.
        run: cmake --build build --config Release -j 2

  backend-parity:
    name: backend parity (xpu surface)
    if: "!contains(github.event.head_commit.message, '[skip build]')"
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - name: Diff loops::xpu symbols across backend/{cuda,hip}.hxx
        # The two backend files hand-mirror the same loops::xpu surface; a symbol
        # added to one and forgotten in the other only fails when that backend is
        # compiled. Diff the declared names (using / inline constexpr / inline fn)
        # so the gap is caught in milliseconds, no toolchain required.
        run: |
          python3 - <<'PY'
          import re, sys

          def symbols(path):
              text = open(path).read()
              s = set()
              s |= set(re.findall(r'^\s*using\s+(\w+)\s*=', text, re.M))
              s |= set(re.findall(r'^\s*inline\s+constexpr\s+\w+\s+(\w+)\s*=', text, re.M))
              s |= set(re.findall(r'^\s*inline\b.*?(\w+)\s*\(', text, re.M))
              return s

          cuda = symbols('include/loops/backend/cuda.hxx')
          hip = symbols('include/loops/backend/hip.hxx')
          only_cuda = sorted(cuda - hip)
          only_hip = sorted(hip - cuda)
          if only_cuda or only_hip:
              print('loops::xpu surface mismatch between backend/cuda.hxx and backend/hip.hxx:')
              if only_cuda:
                  print('  only in cuda.hxx:', ', '.join(only_cuda))
              if only_hip:
                  print('  only in hip.hxx :', ', '.join(only_hip))
              sys.exit(1)
          print('loops::xpu surface matches across backends (%d symbols).' % len(cuda))
          PY

  hip:
    name: linux / hip / rocm-7.2.4 / ${{ matrix.gfx }}
    if: "!contains(github.event.head_commit.message, '[skip build]')"
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    # ROCm 7.2.4 (latest at time of writing). The `-complete` image bundles the
    # math stack (rocThrust / rocPRIM) the HIP backend links against. No GPU at
    # the runner: building objects for --offload-arch=gfxXXX is offline-only, so
    # the binaries are compiled but never run.
    container:
      image: rocm/dev-ubuntu-24.04:7.2.4-complete
    env:
      # Point find_package(hip/rocprim/rocthrust) at the ROCm install; the image
      # ships them under /opt/rocm but does not put it on the default prefix path.
      CMAKE_PREFIX_PATH: /opt/rocm
    strategy:
      fail-fast: false
      matrix:
        include:
          - gfx: gfx90a   # MI210 / MI250 (CDNA2)
            preset: release-mi210
          - gfx: gfx942   # MI300X / MI300A / MI325X (CDNA3)
            preset: release-mi300x
          - gfx: gfx950   # MI350X (CDNA4)
            preset: release-mi350x

    steps:
      - uses: actions/checkout@v5

      - name: hipcc --version
        run: hipcc --version

      - name: Install build tools (cmake, git)
        # The ROCm image ships neither a recent CMake (preset schema v6 +
        # enable_language(HIP)) nor git (cxxopts is fetched via git clone),
        # which the hosted ubuntu runners have by default. Add both.
        run: |
          apt-get update
          apt-get install -y --no-install-recommends python3-pip git ca-certificates
          pip3 install --break-system-packages --no-cache-dir 'cmake>=3.28'
          cmake --version

      - name: 'Configure (preset: ${{ matrix.preset }})'
        run: cmake --preset ${{ matrix.preset }}

      - name: Build (compile-only, no GPU at runner)
        # Cap -j 2 for the same OOM reason as the CUDA jobs (rocThrust-heavy
        # hipcc). group_mapped is HIP-excluded (cooperative-groups), so the
        # target set is the rest of the SpMV examples.
        run: cmake --build build/${{ matrix.preset }} -j 2

      - name: List built binaries
        run: ls -la build/${{ matrix.preset }}/bin/
