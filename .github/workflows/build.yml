name: build

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

# Cancel old runs on the same ref when a new one starts.
concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: linux / ubuntu-${{ matrix.os }} / cuda-${{ matrix.cuda }}
    if: "!contains(github.event.head_commit.message, '[skip build]')"
    runs-on: ubuntu-${{ matrix.os }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        os: ['22.04', '24.04']
        cuda: ['12.6.3', '13.0.0']
        exclude:
          # CUDA 13 needs newer glibc than 22.04 ships.
          - os: '22.04'
            cuda: '13.0.0'

    steps:
      - uses: actions/checkout@v5

      - name: Install CUDA Toolkit ${{ matrix.cuda }}
        uses: Jimver/cuda-toolkit@v0.2.35
        id: cuda-toolkit
        with:
          cuda: ${{ matrix.cuda }}
          # Default `local` method with `--toolkit` skips drivers and samples
          # (~30% smaller install). `network` + sub-packages is faster but the
          # sub-package naming is brittle and version-sensitive on Linux.
          linux-local-args: '["--toolkit"]'
          # Required for matrix builds so each job's log file is unique.
          log-file-suffix: 'ubuntu-${{ matrix.os }}-cuda-${{ matrix.cuda }}.txt'

      - name: nvcc --version
        run: nvcc -V

      - name: 'Configure (preset: ci-multi-arch)'
        run: cmake --preset ci-multi-arch

      - name: Build
        # Parallelism is capped via the preset's "jobs": 2 (not a bare -j):
        # unbounded make -j OOM-kills the ~16 GB runner because every
        # Thrust/CUB-heavy nvcc/cicc spawns at once across the f32/f64 x
        # multi-arch target set.
        run: cmake --build --preset ci-multi-arch

      - name: List built binaries
        run: ls -la build/ci-multi-arch/bin/

  windows:
    name: windows / cuda-${{ matrix.cuda }}
    if: "!contains(github.event.head_commit.message, '[skip build]')"
    # Pin to windows-2022 explicitly: the rolling `windows-latest` label is
    # mid-migration to `windows-2025-vs2026` and the Jimver action has
    # historically had install-path issues on the in-flight image. Revisit
    # when the new image stabilizes.
    runs-on: windows-2022
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        cuda: ['12.6.3']

    steps:
      - uses: actions/checkout@v5

      - name: Install CUDA Toolkit ${{ matrix.cuda }}
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: ${{ matrix.cuda }}
          # `network` method downloads only the sub-packages we need
          # (~500 MB) instead of the full 3 GB local installer, which
          # silently hangs on windows-2022 for 25+ minutes.
          method: network
          # Windows sub-package names use underscores (vs. hyphens on
          # Linux) per the Jimver action's windows-links.ts.
          sub-packages: '["nvcc", "cudart", "curand", "curand_dev", "thrust", "visual_studio_integration"]'
          log-file-suffix: 'windows-cuda-${{ matrix.cuda }}.txt'

      - name: nvcc --version
        run: nvcc -V

      - name: Configure
        # No preset on Windows: the default generator there is Visual Studio
        # which doesn't always honor the preset's generator field. Match the
        # CI preset's architectures (sm_80;sm_90).
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_CUDA_ARCHITECTURES="80;90"

      - name: Build
        # Cap parallelism (-j 2) for the same OOM reason as the Linux job.
        run: cmake --build build --config Release -j 2
