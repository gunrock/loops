services:
  loops-dev:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: runtime
    image: loops-dev:latest
    container_name: loops-dev
    network_mode: host

    # NVIDIA GPU access via the NVIDIA Container Toolkit.
    # Requires `nvidia-container-toolkit` on the host and Docker >= 19.03.
    # See: https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, compute, utility]
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - GIT_SSH_COMMAND=ssh -o StrictHostKeyChecking=no

    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp=unconfined
    shm_size: 16g
    ulimits:
      memlock:
        soft: -1
        hard: -1
      stack:
        soft: 67108864
        hard: 67108864

    volumes:
      - ${HOME}:${HOME}
      - .:/workspace
    working_dir: /workspace
    tty: true
    stdin_open: true
